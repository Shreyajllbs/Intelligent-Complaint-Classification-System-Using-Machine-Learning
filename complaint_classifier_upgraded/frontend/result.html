<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="images/academics.jpeg">

</head>
<body class="result-body">
<!-- NAVBAR -->
<div class="navbar">
    <div class="college-name">
        LBS INSTITUTE OF TECHNOLOGY FOR WOMEN POOJAPURA
    </div>
    <div class="nav-links">
        <a href="index.html">Home</a>
    </div>
</div>

<!-- RESULT SECTION -->
<div class="result-page">

    <!-- 🔴 TOP: PREDICTED CATEGORY -->
    <div class="top-category">
        <h1 id="predictedCategory"></h1>
    </div>

    <!-- CONTENT AREA -->
    <div class="main-content">

        <!-- 🟡 LEFT: DESCRIPTION + CONTACT -->
        <div class="left-section">

            <h2>Description</h2>
            <p id="descriptionText"></p>

            <!-- ⬜ CONTACT BOX -->
            <div class="contact-box">
                <h3>Contact Details</h3>
                <p id="email"></p>
                <p id="phone"></p>
            </div>

            <!-- 🔵 FEEDBACK SECTION -->
            <div class="feedback-box" id="feedbackBox">
                <h3>Was this prediction correct?</h3>
                <button onclick="handleFeedback('yes')">Yes</button>
                <button onclick="handleFeedback('no')">No</button>
            </div>
        </div>

        

    </div>
</div>
<!-- 🔥 NEW SECOND RECTANGLE -->
<div class="action-section">

    <div class="action-box">
        <h3>What you should do</h3>
        <ul>
            <li>  Send complaint with details</li>
            <li>  Attach proof</li>
        </ul>
    </div>

    <div class="action-box">
        <h3>Resolution time</h3>
        <p>Usually resolved in 2–3 days</p>
    </div>

</div>
