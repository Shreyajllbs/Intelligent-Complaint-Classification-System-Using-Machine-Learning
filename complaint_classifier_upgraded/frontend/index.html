</head>
<body class="home-page">
  <div class="sidebar">
  <h2 class="logo">Menu</h2>
  <a href="index.html" id="homeLink">Home</a>
<a href="#" onclick="showHistory()" id="historyLink">History</a>

</div>
<!-- ===== ADD NAVBAR BELOW BODY ===== -->
<div class="navbar" id="navbar">
    <div class="menu-icon" onclick="toggleSidebar()">☰</div>
  <div class="college-name">LBS INSTITUTE OF TECHNOLOGY FOR WOMEN POOJAPURA</div>
  <div class="nav-links">
    <a href="category.html?category=Academic%20Support%20and%20Resources">Academic</a>
    <a href="category.html?category=Student%20Affairs">Student Affairs</a>
    <a href="category.html?category=Athletics%20and%20Sports">Athletics</a>

    <a href="category.html?category=Health%20and%20Well-being%20Support">Health</a>

  </div>
</div>
<div id="homeSection">
<div class="hero-text">
  <h1>CampusResolver</h1>
  <p>Intelligently directing student concerns to the right place</p>
</div>
<div class="container">
  <div class="card">
    <h5 class="subtitle">Submit your complaint</h5>

    <textarea id="complaint" placeholder="Enter your complaint here..."></textarea>
    
    <button onclick="sendComplaint()">Submit Complaint</button>

    <div class="result">
      <h3 id="category"></h3>
      <p id="email"></p>
      <p id="phone"></p>
    </div>
  </div>
</div>
</div>
<div id="historySection" style="display:none;">

  <!-- ✅ ADD THIS LINE -->
  <div class="menu-icon" onclick="toggleSidebar()">☰</div>

  <div class="history-container">

    <!-- LEFT: PIE CHART -->
    <div class="chart-box">
      <canvas id="complaintChart"></canvas>
    </div>

    <!-- RIGHT: RECENT COMPLAINTS -->
    <div class="card">
      <h2>Recent Complaints</h2>
      <div id="historyList"></div>
    </div>

  </div>
</div>
<script src="script.js"></script>
</body>
